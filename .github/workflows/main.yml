name: scron Build System 🚀

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'

      # 1. توليد الملفات الأساسية
      - name: Fix Native Files
        run: flutter create --project-name=scron . --platforms android

      # 2. الحل الجذري: مسح ملف المانيفست القديم وصناعة واحد جديد بـ "إذن الإنترنت" 💉
      - name: Force Internet Permission
        run: |
          cat <<EOF > android/app/src/main/AndroidManifest.xml
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.INTERNET" />
              <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE" />
              <application
                  android:label="scron"
                  android:name="\${applicationName}"
                  android:icon="@mipmap/launcher_icon">
                  <activity
                      android:name=".MainActivity"
                      android:exported="true"
                      android:launchMode="singleTop"
                      android:theme="@style/LaunchTheme"
                      android:configChanges="orientation|keyboardHidden|keyboard|screenSize|smallestScreenSize|screenLayout|density|uiMode"
                      android:hardwareAccelerated="true"
                      android:windowSoftInputMode="adjustResize">
                      <meta-data
                        android:name="io.flutter.embedding.android.NormalTheme"
                        android:resource="@style/NormalTheme"
                        />
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN"/>
                          <category android:name="android.intent.category.LAUNCHER"/>
                      </intent-filter>
                  </activity>
                  <meta-data
                      android:name="flutterEmbedding"
                      android:value="2" />
              </application>
          </manifest>
          EOF

      - name: Get Dependencies
        run: flutter pub get
      
      - name: Build APK
        run: flutter build apk --release --split-per-abi

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Scron-Final-APKs
          path: build/app/outputs/flutter-apk/*.apk
      - name: Inject Internet Permission
        run: |
          sed -i '/<application/i \    <uses-permission android:name="android.permission.INTERNET" />' android/app/src/main/AndroidManifest.xml

      - name: Get Dependencies
        run: flutter pub get
      
      # توليد الأيقونات (تأكد من وجود صورة باسم scan.png في المجلد الرئيسي)
      - name: Generate Icons
        run: dart run flutter_launcher_icons
      
      # بناء الـ APK وتقسيمه لتقليل الحجم (arm64 هو اللي يهمك)
      - name: Build APK
        run: flutter build apk --release --split-per-abi

      # رفع الملفات الناتجة (الـ 3 نسخ)
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Scron-APKs-Pack
          path: build/app/outputs/flutter-apk/*.apk
