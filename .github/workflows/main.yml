name: scron Build System 🚀

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    # تعريف البيئة لتجنب تحذيرات Node.js 24 المستقبيلة 😎
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'

      # بناء ملفات الأندرويد من جديد مع اسم الحزمة الصغير
      - name: Fix Native Files
        run: flutter create --project-name=scron . --platforms android

      # السطر العبقري لحقن إذن الإنترنت في ملف المانيفست 💉
      - name: Inject Internet Permission
        run: |
          sed -i '/<application/i \    <uses-permission android:name="android.permission.INTERNET" />' android/app/src/main/AndroidManifest.xml

      - name: Get Dependencies
        run: flutter pub get
      
      # توليد الأيقونات (تأكد من وجود صورة باسم scan.png في المجلد الرئيسي)
      - name: Generate Icons
        run: dart run flutter_launcher_icons
      
      # بناء الـ APK وتقسيمه لتقليل الحجم (arm64 هو اللي يهمك)
      - name: Build APK
        run: flutter build apk --release --split-per-abi

      # رفع الملفات الناتجة (الـ 3 نسخ)
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Scron-APKs-Pack
          path: build/app/outputs/flutter-apk/*.apk
